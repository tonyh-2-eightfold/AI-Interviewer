<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Career Coach — AI Usage Check-in</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" />
<script src="config.js"></script>
<script src="flows/voice_intake_sarah.js"></script>
<style>
  @font-face {
    font-family: 'Gilroy';
    src: url('fonts/Gilroy-Regular.otf') format('opentype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Gilroy';
    src: url('fonts/Gilroy-RegularItalic.otf') format('opentype');
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: 'Gilroy';
    src: url('fonts/Gilroy-Medium.otf') format('opentype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Gilroy';
    src: url('fonts/Gilroy-MediumItalic.otf') format('opentype');
    font-weight: 500;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: 'Gilroy';
    src: url('fonts/Gilroy-SemiBold.otf') format('opentype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Gilroy';
    src: url('fonts/Gilroy-Bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Gilroy';
    src: url('fonts/Gilroy-BoldItalic.otf') format('opentype');
    font-weight: 700;
    font-style: italic;
    font-display: swap;
  }
  :root {
    /* Deep purple canvas matches the existing coach-session visual DNA */
    --ink:        #F5F1FA;
    --ink-dim:    rgba(245,241,250,0.72);
    --ink-fade:   rgba(245,241,250,0.42);
    --ink-ghost:  rgba(245,241,250,0.18);
    --ring:       rgba(245,241,250,0.22);
    --ring-soft:  rgba(245,241,250,0.10);

    --chip-bg:    rgba(26,16,46,0.62);
    --chip-br:    rgba(255,255,255,0.14);

    --accent-green: #34D399;      /* timer pill */
    --danger:       #F2B6B4;      /* end-check-in pill */
    --danger-ink:   #3a1213;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Gilroy', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-weight: 500;
    color: var(--ink);
    background: #1c1334;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Ambient blobs ──────────────────────────────────────────────────────── */
  .blobs {
    position: absolute;
    inset: 0;
    overflow: visible;
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s ease, filter 3.2s ease;
    z-index: 0;
  }
  body.speaking      .blobs { opacity: 0.22; }
  body.user-speaking .blobs { opacity: 0.04; }

  .blob {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    mix-blend-mode: screen;
  }
  .blob.b1 {
    width: 560px; height: 440px;
    margin-left: -350px; margin-top: -280px;
    background: radial-gradient(circle at 44% 42%, #d4a0ff 0%, #a855f7 50%, #7c3aed 80%, transparent 100%);
    animation: bdrift1 13s ease-in-out infinite;
  }
  .blob.b2 {
    width: 480px; height: 540px;
    margin-left: -160px; margin-top: -260px;
    background: radial-gradient(circle at 52% 48%, #fbb8ff 0%, #e879f9 50%, #c026d3 80%, transparent 100%);
    animation: bdrift2 17s ease-in-out infinite;
  }
  .blob.b3 {
    width: 520px; height: 400px;
    margin-left: -300px; margin-top: -130px;
    background: radial-gradient(circle at 50% 50%, #b0b3ff 0%, #6366f1 50%, #4338ca 80%, transparent 100%);
    animation: bdrift3 11s ease-in-out infinite;
  }
  @keyframes bdrift1 {
    0%   { transform: translate(  0px,   0px) scale(0.80); opacity: 0.40; filter: blur(95px); }
    30%  { transform: translate( 30px, -20px) scale(1.45); opacity: 0.75; filter: blur(68px); }
    65%  { transform: translate(-15px,  25px) scale(0.68); opacity: 0.18; filter: blur(118px); }
    100% { transform: translate(  0px,   0px) scale(0.80); opacity: 0.40; filter: blur(95px); }
  }
  @keyframes bdrift2 {
    0%   { transform: translate(  0px,   0px) scale(1.10); opacity: 0.30; filter: blur(88px); }
    35%  { transform: translate(-25px,  20px) scale(0.70); opacity: 0.14; filter: blur(115px); }
    70%  { transform: translate( 20px, -15px) scale(1.50); opacity: 0.72; filter: blur(62px); }
    100% { transform: translate(  0px,   0px) scale(1.10); opacity: 0.30; filter: blur(88px); }
  }
  @keyframes bdrift3 {
    0%   { transform: translate(  0px,   0px) scale(0.88); opacity: 0.45; filter: blur(92px); }
    40%  { transform: translate( 20px,  15px) scale(1.38); opacity: 0.68; filter: blur(72px); }
    75%  { transform: translate(-20px, -25px) scale(0.65); opacity: 0.12; filter: blur(120px); }
    100% { transform: translate(  0px,   0px) scale(0.88); opacity: 0.45; filter: blur(92px); }
  }

  /* ---------- Page canvas ---------- */
  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(120% 90% at 78% 55%, #5a2a68 0%, #3d1d59 38%, #201343 68%, #160c2f 100%);
    overflow: hidden;
  }
  /* Faint starfield sparkle */
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(1px 1px at 18% 22%, rgba(255,255,255,0.35), transparent 60%),
      radial-gradient(1px 1px at 72% 14%, rgba(255,255,255,0.25), transparent 60%),
      radial-gradient(1px 1px at 84% 72%, rgba(255,255,255,0.22), transparent 60%),
      radial-gradient(1px 1px at 24% 78%, rgba(255,255,255,0.28), transparent 60%),
      radial-gradient(1px 1px at 52% 34%, rgba(255,255,255,0.18), transparent 60%);
    opacity: 0.7;
    pointer-events: none;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: absolute; inset: 0 0 auto 0;
    height: 80px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 5;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 20px; font-weight: 600; letter-spacing: -0.005em;
    color: var(--ink);
  }
  .brand .spark {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 24px;
    color: var(--ink);
  }

  .top-actions {
    display: inline-flex; align-items: center; gap: 12px;
  }
  .usage-group {
    display: inline-flex; align-items: center; gap: 0;
    font-size: 14px; font-weight: 600;
    color: #B9F4E4;
    opacity: 0;
    pointer-events: none;
    transition: gap 0.45s ease, opacity 0.3s ease;
  }
  body:not(.not-started) .usage-group { gap: 10px; opacity: 1; pointer-events: auto; }
  .timer-pill {
    display: inline-flex; align-items: center;
    padding: 4px 6px;
    font-size: 14px; font-weight: 600;
    background: #1B5143;
    color: #8CE1CA;
    border-radius: 4px;
    font-variant-numeric: tabular-nums;
    max-width: 120px;
    overflow: hidden;
    white-space: nowrap;
    transition: max-width 0.45s ease, padding 0.45s ease, opacity 0.35s ease;
  }
  body.not-started .timer-pill { max-width: 0; padding-left: 0; padding-right: 0; opacity: 0; }
  .icon-btn {
    width: 36px; height: 36px;
    padding: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 0;
    color: var(--ink);
    opacity: 0.5;
    cursor: pointer;
    border-radius: 50%;
    transition: background 0.15s ease, opacity 0.15s ease;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.08); opacity: 1; }
  .icon-btn .mdi { font-size: 20px; }

  /* ---------- Main composition ---------- */
  .center {
    position: absolute;
    inset: 80px 0 110px 0;
    display: grid;
    grid-template-columns: auto auto;
    justify-content: center;
    align-items: center;
    padding: 0 clamp(40px, 8vw, 120px);
    gap: clamp(40px, 8vw, 100px);
    opacity: 0;
    pointer-events: none;
    transition: padding 0.7s cubic-bezier(.2,.7,.2,1),
                gap 0.7s cubic-bezier(.2,.7,.2,1),
                opacity 0.55s ease;
  }
  body:not(.not-started) .center { opacity: 1; pointer-events: auto; }
  body.avatar-transitioning .center { opacity: 0 !important; pointer-events: none !important; transition: none !important; }
  /* ---------- Avatar ---------- */
  .avatar-col {
    position: relative; display: flex; align-items: center; justify-content: flex-start;
    transition: transform 0.65s cubic-bezier(.2,.7,.2,1);
  }
  body:not(.sharing) .avatar-col { justify-content: center; }

  .avatar-wrap {
    position: relative;
    width: 360px; height: 360px;
    display: flex; align-items: center; justify-content: center;
    transition: width 0.7s cubic-bezier(.2,.7,.2,1),
                height 0.7s cubic-bezier(.2,.7,.2,1),
                opacity 0.6s ease;
  }
  body.sharing .avatar-wrap { width: 200px; height: 200px; }
  /* Radiating audio-wave rings — spawned by JS, play once and self-remove */
  .rings-wrap {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .rings-wrap.paused .ring { animation-play-state: paused; }
  .ring {
    position: absolute;
    border-radius: 50%;
    width: 78%; height: 78%;
    top: 50%; left: 50%;
    border: 1.5px solid rgba(245, 241, 250, 0.65);
    opacity: 0;
    pointer-events: none;
    animation: radiate 3.2s linear forwards;
  }
  @keyframes radiate {
    0%   { transform: translate(-50%, -50%) scale(1);    opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scale(1.78); opacity: 0; }
  }

  .avatar-border {
    border-radius: 50%;
    padding: 4px;
    background: conic-gradient(from 290deg, #4751AD 0%, #C262BF 50%, #4751AD 100%);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    isolation: isolate;
    transition: width 0.7s cubic-bezier(.2,.7,.2,1),
                height 0.7s cubic-bezier(.2,.7,.2,1);
  }
  .avatar {
    width: 280px; height: 280px;
    border-radius: 50%;
    background: #2a1a4a;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    overflow: hidden;
    position: relative;
  }
  .avatar::before {
    content: '';
    position: absolute;
    inset: -20px;
    background: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAASABIAAD/4QBMRXhpZgAATU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAAGKADAAQAAAABAAAAGAAAAAD/7QA4UGhvdG9zaG9wIDMuMAA4QklNBAQAAAAAAAA4QklNBCUAAAAAABDUHYzZjwCyBOmACZjs+EJ+/8AAEQgAGAAYAwEiAAIRAQMRAf/EAB8AAAEFAQEBAQEBAAAAAAAAAAABAgMEBQYHCAkKC//EALUQAAIBAwMCBAMFBQQEAAABfQECAwAEEQUSITFBBhNRYQcicRQygZGhCCNCscEVUtHwJDNicoIJChYXGBkaJSYnKCkqNDU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6g4SFhoeIiYqSk5SVlpeYmZqio6Slpqeoqaqys7S1tre4ubrCw8TFxsfIycrS09TV1tfY2drh4uPk5ebn6Onq8fLz9PX29/j5+v/EAB8BAAMBAQEBAQEBAQEAAAAAAAABAgMEBQYHCAkKC//EALURAAIBAgQEAwQHBQQEAAECdwABAgMRBAUhMQYSQVEHYXETIjKBCBRCkaGxwQkjM1LwFWJy0QoWJDThJfEXGBkaJicoKSo1Njc4OTpDREVGR0hJSlNUVVZXWFlaY2RlZmdoaWpzdHV2d3h5eoKDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uLj5OXm5+jp6vLz9PX29/j5+v/bAEMABAQEBAQEBgQEBgkGBgYJDAkJCQkMDwwMDAwMDxIPDw8PDw8SEhISEhISEhUVFRUVFRkZGRkZHBwcHBwcHBwcHP/bAEMBBAUFBwcHDAcHDB0UEBQdHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHR0dHf/dAAQAAv/aAAwDAQACEQMRAD8A9P8AjLALjxRpQHHmSyDP1EYry3V7PW9N1/Rdai1LzNN1KYWwstu0eWxKBySfv7hu6dOK9K+Mt2lnrWhTHH+skIBOM7VjOPxxXAeIrLSo/Evhm4McFvZGYD7Q8mWLRjeAWIC/eG0d+a8ys3ztI9LDKLh73ZnOfFDSrWXR2S6EfX935hAAfsQf8O2a+cP+EfT+/af99/8A1q938bXcN6+uW19Mk1sHVrfe4wW6gJnofp6V4l9lsf8AnjH/AN9D/GsoPewO+l0f/9DrP2gZoLX+y7i6jSWMW918rjI3FYlBwfQnIr5R8Q67fa14csdDnC+TbyNMr87x5pBKemMjNfUH7S//ACDtM/64z/zhr5Il/wCPeP6R1tTpxknddTJ1JJIs+H5tHn0J7TUbiKJhdCF5H4IjGGUk4PJBYDjPFbP9h+Af+A1D/wB/D/8AGq8mH/INvf8Ar7h/9BeqNeJVSVSSSOvTm+SJ/9k=') center top / cover no-repeat;
    filter: blur(20px);
    z-index: 0;
  }
  .avatar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url('images/john.png') center top / cover no-repeat;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 0;
  }
  .avatar.image-loaded::after { opacity: 1; }
  body.sharing .avatar { width: 150px; height: 150px; }
  .avatar video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    transition: opacity 0.7s ease;
    z-index: 2;
  }
  .avatar.video-loaded::after { opacity: 0; }
  #coachVideo     { opacity: 0; }
  #listeningVideo { opacity: 0; }
  .avatar.video-loaded #coachVideo            { opacity: 1; }
  body.agent-listening .avatar #coachVideo    { opacity: 0; }
  body.agent-listening .avatar #listeningVideo { opacity: 1; }
  body.speaking   .avatar #listeningVideo     { opacity: 0; }
  body.mic-off    .avatar #listeningVideo     { opacity: 0; }
  body.mic-off    .avatar #coachVideo         { opacity: 1; }

  /* Speaker chip / listening chip */
  .speaker-chip,
  .listening-chip {
    position: absolute;
    left: 50%; bottom: -14px;
    transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px 6px 10px;
    background: rgba(0, 0, 0, 0.25);
    border: 0.5px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    color: var(--ink);
    font-size: 13px; font-weight: 600;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -1px 0 rgba(0,0,0,0.25),
      inset 1px 0 0 rgba(255,255,255,0.06),
      inset -1px 0 0 rgba(0,0,0,0.15),
      0 8px 24px rgba(0,0,0,0.25);
    opacity: 0;
    transition: opacity 0.5s ease;
    white-space: nowrap;
  }
  body.speaking        .speaker-chip { opacity: 1; }
  body.agent-listening .speaker-chip { opacity: 1; }
  .bars {
    display: inline-flex; align-items: center; gap: 2px;
    height: 14px;
  }
  .bars i {
    display: inline-block;
    width: 2.5px;
    height: 3px;
    background: #5ee7b0;
    border-radius: 3px;
    animation: bar 1.1s ease-in-out infinite;
  }
  .bars i:nth-child(1) { animation-delay:  0.00s; }
  .bars i:nth-child(2) { animation-delay: -0.28s; }
  .bars i:nth-child(3) { animation-delay: -0.55s; }
  .bars i:nth-child(4) { animation-delay: -0.83s; }
  @keyframes bar {
    0%, 100% { height:  3px; }
    50%      { height: 14px; }
  }

  /* ---------- Transcript column (animated scroll) ---------- */
  .transcript-col {
    position: relative;
    width: 380px;
    height: 300px;
  }
  .transcript-viewport {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    opacity: 0;
    margin-top: -60px;
    transition: opacity 0.65s cubic-bezier(.2,.7,.2,1),
                transform 0.65s cubic-bezier(.2,.7,.2,1);
    /* Soft fade at the top so old lines dissolve out as they scroll up */
    -webkit-mask-image: linear-gradient(to bottom,
      transparent 0%, rgba(0,0,0,0.25) 8%, #000 28%, #000 100%);
            mask-image: linear-gradient(to bottom,
      transparent 0%, rgba(0,0,0,0.25) 8%, #000 28%, #000 100%);
  }
  body.speaking .transcript-viewport { opacity: 1; transition-delay: 0.45s; }

  /* Agent chip — bars become static dots in listening mode (width unchanged) */
  body.agent-listening .bars i {
    height: 3px !important;
    border-radius: 3px;
    animation: none;
  }
  body.user-speaking .bars i { animation-play-state: paused; }
  body.mic-off       .bars i { animation-play-state: paused; }

  /* ── Listening waveform — user input indicator ─────────────────────────── */
  .listening-wave {
    position: absolute;
    left: calc(300px + clamp(40px, 8vw, 100px));
    top: 50%;
    transform: translateY(-50%);
    transform-origin: top center;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease,
                left 0.65s cubic-bezier(.2,.7,.2,1),
                top 0.65s cubic-bezier(.2,.7,.2,1),
                transform 0.65s cubic-bezier(.2,.7,.2,1);
  }
  body.agent-listening .listening-wave { opacity: 1; }
  body.mic-off .listening-wave { opacity: 0.25; }
  .lw-bars {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 52px;
  }
  .lw-bars i {
    display: inline-block;
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    background: rgba(245,241,250,0.65);
    border-radius: 6px;
    animation: lwBar 2.2s ease-in-out infinite;
    animation-delay: 0s;
    animation-play-state: paused;
  }
  .listening-wave.animating .lw-bars i,
  body.user-speaking .lw-bars i { animation-play-state: running; }
  .lw-label {
    font-size: 24px;
    font-weight: 500;
    color: rgba(245,241,250,0.65);
    white-space: nowrap;
    min-width: 200px;
    flex-shrink: 0;
  }
  @keyframes lwLabelIn { from { opacity: 0; } to { opacity: 1; } }
  body.agent-listening .lw-label::before { content: 'Start speaking'; }
  .listening-wave.animating .lw-label::before,
  body.agent-listening.user-speaking .lw-label::before {
    content: 'Listening';
    animation: lwLabelIn 0.4s ease;
  }
  /* Negative delays pre-position bars across the cycle — only applied when animating
     so paused bars always freeze at the 0% keyframe (height: 6px = circles). */
  .listening-wave.animating .lw-bars i:nth-child(1) { animation-delay: -0.00s; animation-duration: 2.1s; }
  .listening-wave.animating .lw-bars i:nth-child(2) { animation-delay: -0.72s; animation-duration: 2.4s; }
  .listening-wave.animating .lw-bars i:nth-child(3) { animation-delay: -1.35s; animation-duration: 2.0s; }
  .listening-wave.animating .lw-bars i:nth-child(4) { animation-delay: -0.23s; animation-duration: 2.5s; }
  @keyframes lwBar {
    0%   { height:  6px; }
    28%  { height: 52px; }
    52%  { height: 14px; }
    76%  { height: 46px; }
    100% { height:  6px; }
  }

  .transcript-track {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    min-height: 50%;
    display: flex; flex-direction: column; gap: 20px;
    font-size: 24px;
    line-height: 1.5;
    letter-spacing: -0.01em;
    transition: transform 0.9s cubic-bezier(.2,.7,.2,1);
    will-change: transform;
  }
  .t-line {
    margin: 0;
    transition: color 0.9s ease, opacity 0.9s ease;
  }
  .t-line.age-0 { color: #FFFFFF; font-weight: 500; }           /* current — pure white */
  .t-line.age-1 { color: var(--ink-dim); }
  .t-line.age-2 { color: var(--ink-fade); }
  .t-line.age-3 { color: var(--ink-ghost); }

  .t-line .partial {
    color: var(--ink-fade);
    transition: color 0.4s ease;
  }
  .stream-char {
    opacity: 0;
    animation: streamIn 0.35s ease forwards;
  }
  @keyframes streamIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ---------- Bottom toolbar ---------- */
  .toolbar {
    position: absolute;
    left: 50%; bottom: 28px;
    transform: translateX(-50%) translateY(80px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.55s cubic-bezier(.2,.7,.2,1), opacity 0.45s ease;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 999px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 5;
  }
  .tool-btn {
    width: 44px; height: 44px;
    min-width: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    background: #fff;
    color: #3a2a55;
    border: 0;
    border-radius: 999px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .tool-btn:hover { background: #e8e2f5; color: #1e1040; }
  .tool-btn .mdi { font-size: 24px; }

  .voice-picker-unused {
    height: 32px;
    max-width: 240px;
    padding: 0 8px;
    border: 1px solid rgba(15, 23, 42, 0.12);
    border-radius: 8px;
    background: #fff;
    color: #0f172a;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .voice-picker:hover { border-color: rgba(15, 23, 42, 0.24); }
  .voice-picker:focus-visible { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(121, 83, 209, 0.18); }

  .divider {
    width: 1px; height: 20px;
    background: rgba(255,255,255,0.18);
    margin: 0 4px;
  }

  .end-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 18px 8px 14px;
    background: #FFC6C6;
    color: #6C2222;
    border: 0;
    border-radius: 999px;
    font-family: inherit;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    white-space: nowrap;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .end-btn:hover { background: #f5aaaa; color: #4a1515; }
  .end-btn .mdi { font-size: 24px; }

  /* ── Start screen ────────────────────────────────────────────────────────── */
  .start-screen {
    position: absolute;
    inset: 140px 0 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 28px;
    z-index: 20;
    pointer-events: auto;
  }
  body:not(.not-started) .start-screen { pointer-events: none; }

  /* Start screen exit: slide down + fade */
  .start-hero,
  .start-footer {
    transition: opacity 0.4s ease, transform 0.45s cubic-bezier(.4,0,1,1);
  }
  body:not(.not-started) .start-hero   { opacity: 0; transform: translateY(100px); }
  body:not(.not-started) .start-footer { opacity: 0; transform: translateY(100px); }

  /* Card container fades out */
  body:not(.not-started) .start-card { opacity: 0; transform: translateY(100px); }

  .start-hero { text-align: center; }
  .start-title {
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .start-meta {
    margin: 0;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .meta-label {
    margin: 0;
    font-weight: 600;
    background: linear-gradient(90deg, #A3A8D6, #C1ACDB, #E0B0DF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .meta-dot { margin: 0; font-weight: 600; color: #BDC1C9; }
  .meta-duration { margin: 0; font-weight: 600; color: #BDC1C9; }

  .start-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 32px 40px 28px;
    background: rgba(0, 0, 0, 0.25);
    border: 0.5px solid rgba(255,255,255,0.14);
    border-radius: 24px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -1px 0 rgba(0,0,0,0.25),
      inset 1px 0 0 rgba(255,255,255,0.06),
      inset -1px 0 0 rgba(0,0,0,0.15),
      0 16px 48px rgba(0,0,0,0.25);
    width: 640px;
    max-width: calc(100vw - 48px);
    margin-bottom: 40px;
    transition: opacity 0.4s ease, transform 0.45s cubic-bezier(.4,0,1,1);
  }

  /* Avatar zone */
  .start-avatar-zone {
    position: relative;
    width: 340px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .start-avatar-ring {
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 290deg, #4751AD 0%, #C262BF 50%, #4751AD 100%);
    flex-shrink: 0;

    z-index: 1;
  }
  .start-avatar-img {

  .start-avatar-img::after {
    content: '';

    transition: opacity 0.4s ease;
    z-index: 1;
  }
  .avatar.image-loaded ~ * .start-avatar-img::after,
  .start-avatar-img.image-loaded::after { opacity: 1; }

  /* Speech bubbles */
  .speech-bubble {
    position: absolute;
    padding: 7px 14px;
    background: rgba(0, 0, 0, 0.05);
    border: 0.5px solid rgba(255,255,255,0.14);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -1px 0 rgba(0,0,0,0.25),
      inset 1px 0 0 rgba(255,255,255,0.06),
      inset -1px 0 0 rgba(0,0,0,0.15);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    font-size: 13px;
    font-weight: 500;
    color: #BEC2CA;
    white-space: nowrap;
    opacity: 0;
    animation: bubbleFadeIn 0.5s ease forwards;
  }
  /* sb-1 = "Focused on you" */
  .sb-1 { top: 12%; right: -6%; border-radius: 12px 12px 12px 0; animation-delay: 0.4s; }
  /* sb-2 = "Ask anything" */
  .sb-2 { top: 50%; left: -6%; border-radius: 12px 0 12px 12px; animation-delay: 0.65s; }
  /* sb-3 = "Always private" */
  .sb-3 { bottom: 10%; right: -2%; border-radius: 0 12px 12px 12px; animation-delay: 0.9s; }
  @keyframes bubbleFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .sb-2 { animation-name: bubbleFadeIn; }
  @keyframes bubbleFadeInDim {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 0.45; transform: translateY(0); }
  }

  /* Topics section */
  .cover-label {
    margin: 0 0 12px;
    font-size: 12px;
    font-weight: 600;
    color: #BDC1C9;
    text-align: center;
  }
  .cover-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .cover-pill {
    padding: 6px 10px;
    border-radius: 4px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: #BDC1C9;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .cover-pill:hover { background: rgba(255,255,255,0.10); color: #ffffff; }
  .cover-pill.active {
    background: rgba(255,255,255,0.125);
    color: #ffffff;
  }
  .cover-desc {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    color: #BEC2CA;
    text-align: center;
    min-height: 20px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.05);
    border: 0.5px solid rgba(255,255,255,0.14);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -1px 0 rgba(0,0,0,0.25),
      inset 1px 0 0 rgba(255,255,255,0.06),
      inset -1px 0 0 rgba(0,0,0,0.15);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    transition: opacity 0.2s ease;
  }
  .cover-time { color: #BEC2CA; font-weight: 500; }

  /* Start actions */
  .start-main-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px 10px 16px;
    background: linear-gradient(135deg, #4751AD 0%, #C262BF 100%);
    border: 0;
    border-radius: 999px;
    color: #fff;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.01em;
    margin: 20px 0;
    transition: filter 0.15s ease;
  }
  .start-main-btn:hover { filter: brightness(0.88); }
  .start-main-btn .mdi { font-size: 24px; }
  .start-later-btn {
    display: block;
    background: none;
    border: 0;
    color: rgba(245,241,250,0.55);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.15s ease;
  }
  .start-later-btn:hover { color: var(--ink); }

  /* Footer */
  .start-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 13px;
    color: #BDC1C9;
    background: rgba(0, 0, 0, 0.05);
  }
  .eightfold-logo {
    height: 22px;
    vertical-align: middle;
  }

  body:not(.not-started) .toolbar { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
  body.not-started .transcript-viewport { opacity: 0 !important; pointer-events: none; }


  /* User caption line — Sarah's responses */
  .t-line--user { color: rgba(245, 241, 250, 0.55) !important; font-style: italic; }

  /* Captions off — both columns slide together via transform, no layout change */
  body.captions-off .avatar-col      { transform: translateX(calc(190px + clamp(20px, 4vw, 50px))); }
  body.captions-off .transcript-viewport {
    opacity: 0 !important;
    pointer-events: none;
    transform: translateX(220px);
  }
  body.captions-off .listening-wave {
    left: 50%;
    top: calc(100% + 40px);
    transform: translateX(-50%) scale(0.75);
  }

  /* Mic off — dim avatar + text, tint button */
  body.mic-off .avatar-wrap  { opacity: 0.25; }
  body.mic-off:not(.captions-off) .transcript-viewport { opacity: 0.25 !important; }
  body.mic-off #micBtn { background: rgba(242,182,180,0.22); color: #f2b6b4; }

  /* Mic access overlay */
  .mic-overlay {
    position: absolute;
    bottom: 102px;
    left: 50%;
    transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 12px;
    padding: 13px 18px;
    background: rgba(20, 12, 38, 0.90);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    font-size: 13.5px; color: var(--ink-dim);
    white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    transform: translateX(-50%) translateY(6px);
    z-index: 10;
  }
  body.mic-off .mic-overlay {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
    font-weight: 500;
  }
  .mic-overlay .mdi { font-size: 18px; color: #f2b6b4; flex-shrink: 0; }
  .mic-overlay-btns { display: flex; gap: 6px; margin-left: 8px; flex-shrink: 0; }
  .mic-overlay-dismiss,
  .mic-overlay-secondary {
    padding: 4px 12px;
    border-radius: 999px;
    font: inherit; font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .mic-overlay-dismiss {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.14);
    color: var(--ink);
  }
  .mic-overlay-dismiss:hover { background: rgba(255,255,255,0.18); }
  .mic-overlay-secondary {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--ink-dim);
  }
  .mic-overlay-secondary:hover { background: rgba(255,255,255,0.08); color: var(--ink); }

  /* Debug widget */
  .debug-btn {
    display: block; width: 100%;
    padding: 5px 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: rgba(245,241,250,0.7);
    font-family: inherit; font-size: 12px;
    text-align: left; cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .debug-btn:hover { background: rgba(255,255,255,0.10); color: rgba(245,241,250,1); }
  .debug-btn.debug-active { background: rgba(107,99,246,0.35); border-color: rgba(107,99,246,0.5); color: #fff; }
  #debugWidget.debug-collapsed #debugBody { display: none !important; }

  .fs-btn {
    display: block; width: 100%;
    padding: 5px 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: rgba(245,241,250,0.7);
    font-family: inherit; font-size: 12px;
    text-align: left; cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .fs-btn:hover { background: rgba(255,255,255,0.10); color: rgba(245,241,250,1); }
  .fs-btn.fs-active { background: rgba(107,99,246,0.35); border-color: rgba(107,99,246,0.5); color: #fff; }
  .fs-btn .fs-node { font-size: 10px; opacity: 0.4; float: right; margin-top: 1px; }

  /* Responsive tuck */
  @media (max-width: 820px) {
    .center {
      grid-template-columns: 1fr;
      padding: 0 28px;
      gap: 32px;
    }
    .avatar-wrap { width: 220px; height: 220px; }
    .avatar { width: 170px; height: 170px; }
    .transcript { max-width: 520px; }
  }
  /* Start overlay — needed so first audio playback has a user gesture */
  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 960px) {
    /* Default view: 2-col → single centered column */
    .center {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      justify-items: center;
      align-items: center;
      padding: 0 clamp(16px, 5vw, 48px);
      gap: clamp(20px, 4vw, 40px);
    }

    .avatar-col { justify-content: center !important; }

    .avatar-wrap {
      width: clamp(200px, 42vw, 320px);
      height: clamp(200px, 42vw, 320px);
    }
    .avatar {
      width: clamp(155px, 33vw, 250px);
      height: clamp(155px, 33vw, 250px);
    }

    .transcript-viewport {
      width: min(380px, 100%);
      height: 210px;
    }
    .transcript-track { font-size: 16px; }

  }

  @media (max-width: 520px) {
    .usage-group span:first-child { display: none; }

    .avatar-wrap {
      width: clamp(160px, 50vw, 220px);
      height: clamp(160px, 50vw, 220px);
    }
    .avatar {
      width: clamp(125px, 39vw, 170px);
      height: clamp(125px, 39vw, 170px);
    }

    .transcript-viewport { height: 180px; }
    .transcript-track { font-size: 15px; }

    .toolbar { gap: 4px; padding: 5px; }
    .end-btn { padding: 7px 14px 7px 10px; font-size: 12.5px; }
  }
</style>

<body class="not-started">


<div class="stage">

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="spark mdi mdi-creation" aria-hidden="true"></span>
      Career Coach
    </div>

      <div class="usage-group">
        <span id="headerLabel"></span>
        <span class="timer-pill" id="timerPill">00:00</span>
      </div>
      <button class="icon-btn" title="About this check-in" aria-label="About">
        <span class="mdi mdi-information-outline"></span>
      </button>
      <button class="icon-btn" title="Close" aria-label="Close">
        <span class="mdi mdi-close"></span>
      </button>
    </div>
  </header>

  <!-- ── Start screen ──────────────────────────────────────────────────────── -->
  <div class="start-screen">
    <div class="start-hero">
      <h1 class="start-title"></h1>
      <p class="start-meta">
        <span class="meta-label"></span>
        <span class="meta-dot">·</span>
        <span class="meta-duration"></span>
      </p>
    </div>

    <div class="start-card">
      <!-- Avatar + speech bubbles -->
      <div class="start-avatar-zone">
        <div class="speech-bubble sb-1">Focused on you</div>
        <div class="speech-bubble sb-2">Ask anything</div>
        <div class="speech-bubble sb-3">Always private</div>
        <div class="start-avatar-ring">
          <div class="start-avatar-img" id="startAvatarImg"></div>
        </div>
      </div>

      <!-- Topics -->
      <div class="start-topics">
        <p class="cover-label">This conversation will cover</p>
        <div class="cover-pills" id="coverPills"></div>
        <p class="cover-desc" id="coverDesc"></p>
      </div>

      <!-- Actions -->
      <div class="start-actions" style="display:flex;flex-direction:column;align-items:center;gap:12px">
        <button class="start-main-btn" id="startBtn">
          <span class="mdi mdi-microphone"></span>

      </div>
    </div>

    <div class="start-footer">

      <img src="images/eightfold-logo.png" alt="Eightfold" class="eightfold-logo">

  </div>

  <!-- Center composition -->
  <main class="center" style="opacity:0">
    <!-- Avatar column -->
    <div class="avatar-col">
      <div class="avatar-wrap">
        <div class="blobs" id="blobs">
          <div class="blob b1"></div>
          <div class="blob b2"></div>
          <div class="blob b3"></div>
        </div>
        <div class="rings-wrap" id="ringsWrap"></div>
        <div class="avatar-border">
          <div class="avatar">
            <video loop muted playsinline preload="auto" id="coachVideo">
              <source src="videos/Coach_Claude.mp4" type="video/mp4">
            </video>
            <video loop muted playsinline preload="none" id="listeningVideo">
              <source src="videos/Coach_Listening.mp4" type="video/mp4">
            </video>
          </div>
        </div>
        <div class="speaker-chip" aria-label="John is speaking">
          <span class="bars" aria-hidden="true">
            <i></i><i></i><i></i><i></i>
          </span>
          John

        <div class="listening-wave" aria-hidden="true">
          <div class="lw-bars">
            <i></i><i></i><i></i><i></i>
          </div>
          <p class="lw-label"></p>
        </div>
      </div>
    </div>

    <!-- Transcript column -->
    <div class="transcript-col">
      <div class="transcript-viewport" aria-live="polite">
        <div class="transcript-track" id="track">
          <!-- lines injected by JS -->
        </div>
      </div>
    </div>

  </main>

  <!-- Mic access overlay -->
  <div class="mic-overlay" role="status" aria-live="polite">
    <span class="mdi mdi-microphone-off" aria-hidden="true"></span>
    Career Agent needs to hear you to continue.
    <div class="mic-overlay-btns">
      <button class="mic-overlay-secondary">Switch to text</button>
      <button class="mic-overlay-dismiss" id="micDismiss">Enable mic</button>
    </div>
  </div>

  <!-- Bottom toolbar -->
  <div class="toolbar" role="toolbar" aria-label="Session controls" style="opacity:0">
    <button class="tool-btn" id="captionBtn" title="Toggle captions" aria-label="Toggle captions" aria-pressed="true">
      <span class="mdi mdi-closed-caption"></span>
    </button>
    <button class="tool-btn" id="micBtn" title="Microphone" aria-label="Microphone" aria-pressed="true">
      <span class="mdi mdi-microphone" id="micIcon"></span>
    </button>
    <span class="divider" aria-hidden="true"></span>
    <button class="end-btn" id="endBtn">
      <span class="mdi mdi-close"></span>
      End check-in
    </button>
  </div>
</div>

<script>
  // ── Flow data (swap this JSON to change the conversation) ─────────────────
  let ACTIVE_FLOW = null;
  let _startNodeOverride = null;
  let _timerInterval  = null;
  let _bodyObserver   = null;
  let _sessionStarted = false;
  let _lwAnimTimeout  = null;

  function _resetLwBars() {
    if (_lwAnimTimeout) { clearTimeout(_lwAnimTimeout); _lwAnimTimeout = null; }
    const lw = document.querySelector('.listening-wave');
    if (!lw) return;
    lw.classList.remove('animating');
    // Briefly suppress the animation so bars snap to their resting height (8px)
    // rather than freezing at whatever frame they were on when paused.
    lw.querySelectorAll('.lw-bars i').forEach(b => { b.style.animation = 'none'; });
    requestAnimationFrame(() => {
      lw.querySelectorAll('.lw-bars i').forEach(b => { b.style.animation = ''; });
    });
  }

  // ── Avatar image preload — runs immediately so placeholder is never black ─
  (() => {
    const img = new Image();
    img.onload = () => {
      document.querySelectorAll('.avatar, #startAvatarImg').forEach(el => el.classList.add('image-loaded'));
    };
    img.src = 'images/john.png';
  })();

  // ── Flow loader — fetches a flow JSON file and populates the start screen ─
  function loadFlow(flowData) {
    ACTIVE_FLOW = flowData;
    const m = ACTIVE_FLOW.meta;

    document.querySelector('.start-title').textContent   = m.title;
    document.querySelector('.meta-label').textContent    = m.conversationType;
    document.querySelector('.meta-duration').textContent = m.duration;
    document.getElementById('headerLabel').textContent   = m.conversationType;

    const pillsEl = document.getElementById('coverPills');
    const descEl  = document.getElementById('coverDesc');

    pillsEl.innerHTML = m.topics.map((t, i) =>
      `<button class="cover-pill${i === 0 ? ' active' : ''}" data-idx="${i}">${t.label}</button>`
    ).join('');

    const setDesc = (t) => {
      descEl.innerHTML = `<strong class="cover-time">${t.time}</strong> · ${t.description}`;
    };

    setDesc(m.topics[0]);

    pillsEl.querySelectorAll('.cover-pill').forEach((pill, i) => {
      pill.addEventListener('click', () => {
        pillsEl.querySelectorAll('.cover-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        const t = m.topics[i];
        descEl.style.opacity = '0';
        setTimeout(() => { setDesc(t); descEl.style.opacity = '1'; }, 150);
      });
    });
  }

  loadFlow(FLOW_voice_intake_sarah);

  // ── Videos + timer — only start when user clicks Begin ──────────────────

  // TODO: Listening video crop is still broken in Safari.
  // Safari ignores object-position on <video> elements entirely (longstanding WebKit bug),
  // so this function manually replicates object-fit:cover + object-position:70% top by
  // sizing the element to the video's natural aspect ratio and offsetting `left` to
  // show the correct portion of the frame (coach's face is on the right of the shot).
  // The function is called on `canplay` and again from sync() each time agent-listening
  // is entered, but in practice Safari sometimes still renders the video content offset
  // within the element — possibly because videoWidth/videoHeight aren't stable yet when
  // the styles are applied. Needs more investigation; Chrome works correctly.
  function _positionListeningVideo() {
    const lvid = document.getElementById('listeningVideo');
    if (!lvid) return;
    const avatar = lvid.closest('.avatar');
    if (!avatar || !lvid.videoWidth) return;

    const cW = avatar.offsetWidth;
    const cH = avatar.offsetHeight;
    const vRatio = lvid.videoWidth / lvid.videoHeight;
    const cRatio = cW / cH;

    let scaledW, scaledH;
    if (vRatio > cRatio) { scaledH = cH; scaledW = scaledH * vRatio; }
    else                  { scaledW = cW; scaledH = scaledW / vRatio; }

    const overflowX = scaledW - cW;
    const leftPx = -(0.70 * overflowX);

    Object.assign(lvid.style, {
      width:  scaledW + 'px',
      height: scaledH + 'px',
      left:   leftPx  + 'px',
      right:  'auto',
      top:    '0px',
    });
  }

  function _startSession() {
    const cvid = document.getElementById('coachVideo');
    const lvid = document.getElementById('listeningVideo');

    if (lvid) {
      lvid.addEventListener('canplay', _positionListeningVideo, { once: true });
      if (lvid.videoWidth > 0) _positionListeningVideo(); // already ready
      lvid.load();
    }

    if (cvid) {
      const onReady = () => {
        cvid.pause();
        document.querySelector('.avatar').classList.add('video-loaded');
      };
      if (cvid.readyState >= 2) { onReady(); }
      else { cvid.addEventListener('canplay', onReady, { once: true }); }

      const sync = () => {
        const speaking  = document.body.classList.contains('speaking');
        const micOff    = document.body.classList.contains('mic-off');
        const listening = document.body.classList.contains('agent-listening');
        if (speaking && !micOff) {
          cvid.play().catch(() => {});
          if (lvid) lvid.pause();
        } else if (listening && !micOff) {
          cvid.pause();
          if (lvid) {
            _positionListeningVideo();
            const playWhenReady = () => {
              if (document.body.classList.contains('agent-listening') &&
                  !document.body.classList.contains('mic-off')) {
                _positionListeningVideo();
                lvid.play().catch(() => {});
              }
            };
            if (lvid.readyState >= 2) {
              playWhenReady();
            } else {
              lvid.load();
              lvid.addEventListener('canplay', playWhenReady, { once: true });
            }
          }
        } else {
          cvid.pause();
          if (lvid) lvid.pause();
        }
      };
      _bodyObserver = new MutationObserver(sync);
      _bodyObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    }

    // Timer
    const el = document.getElementById('timerPill');
    let seconds = 0;
    _timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      el.textContent = `${m}:${s}`;
    }, 1000);
  }

  function resetSession() {
    // Stop any in-flight audio
    if (_activeAudio) { _activeAudio.pause(); _activeAudio = null; }
    if (_cancelAudio) { _cancelAudio(); _cancelAudio = null; }
    // Stop rings, timer, and listening-wave animation timeout
    stopRings();
    if (_timerInterval)   { clearInterval(_timerInterval);   _timerInterval  = null; }
    _resetLwBars();
    // Disconnect body class observer
    if (_bodyObserver) { _bodyObserver.disconnect(); _bodyObserver = null; }
    // Pause videos and hide loaded state
    const cvid = document.getElementById('coachVideo');
    const lvid  = document.getElementById('listeningVideo');
    if (cvid) cvid.pause();
    if (lvid) lvid.pause();
    document.querySelector('.avatar').classList.remove('video-loaded');
    // Clear transcript
    document.getElementById('track').innerHTML = '';
    // Reset body classes (preserve captions-off)
    ['speaking','agent-listening','user-speaking','mic-off','avatar-transitioning'].forEach(c =>
      document.body.classList.remove(c));
    document.body.classList.add('not-started');
    // Remove any in-flight fly clone
    document.querySelectorAll('.avatar-fly').forEach(f => f.remove());
    // Clear inline styles set during fly animation
    document.querySelector('.center').style.opacity   = '';
    document.querySelector('.toolbar').style.opacity  = '';
    const convBorder = document.querySelector('.avatar-border');
    const convAvatar = document.querySelector('.avatar');
    convBorder.style.opacity    = '';
    convBorder.style.transition = '';
    convAvatar.style.opacity    = '';
    convAvatar.style.transition = '';
    // Restore start-screen avatar ring
    document.querySelector('.start-avatar-ring').style.opacity = '';
    // Reset timer display
    document.getElementById('timerPill').textContent = '00:00';
    // Reset mic to unmuted
    _muted      = false;
    _flowPaused = false;
    _resumeFlow = null;
    document.getElementById('micBtn').setAttribute('aria-pressed', 'true');
    document.getElementById('micIcon').className = 'mdi mdi-microphone';
    document.getElementById('ringsWrap').classList.remove('paused');
    // Allow start button to fire again
    _sessionStarted = false;
  }

  // ── Audio playback (uses paths from JSON; fails silently if files missing) ─
  async function elevenLabsTTS(text, voiceId) {
    const key = window.ELEVEN_KEY;
    const vid = voiceId || window.ELEVEN_VOICE_ID || 'EXAVITQu4vr4xnSDxMaL';
    if (!key || !text) return null;
    try {
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`, {
        method: 'POST',
        headers: { 'xi-api-key': key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, model_id: 'eleven_turbo_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } }),
      });
      if (!res.ok) return null;
      const blob = await res.blob();
      return URL.createObjectURL(blob);
    } catch { return null; }
  }

  let _activeAudio  = null;
  let _cancelAudio  = null;
  function playAudio(src, isAI) {
    if (_activeAudio) { _activeAudio.pause(); _activeAudio = null; }
    if (_cancelAudio) { _cancelAudio(); _cancelAudio = null; }
    if (!src) return Promise.resolve();
    return new Promise(resolve => {
      const audio = new Audio(src);
      _activeAudio = audio;
      let settled = false;
      const done = () => {
        if (settled) return; settled = true;
        _cancelAudio = null;
        if (_activeAudio === audio) _activeAudio = null;
        resolve();
      };
      _cancelAudio = done;
      if (isAI) {
        audio.addEventListener('playing', () => document.body.classList.add('speaking'), { once: true });
      }
      audio.onended = done;
      audio.onerror = done;
      audio.play().catch(done);
    });
  }

  // ── Caption toggle ────────────────────────────────────────────────────────
  (() => {
    const btn = document.getElementById('captionBtn');
    const icon = btn.querySelector('.mdi');
    btn.addEventListener('click', () => {
      const off = document.body.classList.toggle('captions-off');
      btn.setAttribute('aria-pressed', String(!off));
      icon.className = off ? 'mdi mdi-closed-caption-outline' : 'mdi mdi-closed-caption';
    });
  })();

  // ── Mic toggle ────────────────────────────────────────────────────────────
  let _muted      = false;
  let _flowPaused = false;
  let _resumeFlow = null;

  (() => {
    const btn      = document.getElementById('micBtn');
    const icon     = document.getElementById('micIcon');
    const dismiss  = document.getElementById('micDismiss');
    const ringsWrap = document.getElementById('ringsWrap');

    const setMic = (off) => {
      _muted = off;
      const vid = document.getElementById('coachVideo');
      if (off) {
        _flowPaused = true;
        if (_activeAudio) _activeAudio.pause();
        if (_cancelAudio) _cancelAudio();
        stopRings();
        if (vid) vid.pause();
        ringsWrap.classList.add('paused');
        document.body.classList.add('mic-off');
        _resetLwBars();
      } else {
        _flowPaused = false;
        ringsWrap.classList.remove('paused');
        document.body.classList.remove('mic-off');
        if (document.body.classList.contains('speaking')) startRings();
        if (_resumeFlow) {
          const cb = _resumeFlow;
          _resumeFlow = null;
          cb();
        }
      }
      btn.setAttribute('aria-pressed', String(!off));
      icon.className = off ? 'mdi mdi-microphone-off' : 'mdi mdi-microphone';
    };

    btn.addEventListener('click', () => setMic(!_muted));
    dismiss.addEventListener('click', () => setMic(false));
  })();

  // ── Ring spawner ──────────────────────────────────────────────────────────
  (() => {
    const wrap = document.getElementById('ringsWrap');
    const GAPS = [600, 1100, 700, 800]; // ms between each successive ring
    let _timeouts = [];
    let _active = false;

    function spawnRing() {
      const ring = document.createElement('div');
      ring.className = 'ring';
      wrap.appendChild(ring);
      ring.addEventListener('animationend', () => ring.remove(), { once: true });
    }

    function scheduleNext(idx) {
      const gap = GAPS[idx % GAPS.length];
      const t = setTimeout(() => {
        if (!_active) return;
        spawnRing();
        scheduleNext(idx + 1);
      }, gap);
      _timeouts.push(t);
    }

    window.startRings = () => {
      if (_active) return;
      _active = true;
      spawnRing();         // first ring immediately
      scheduleNext(0);
    };

    window.stopRings = () => {
      _active = false;
      _timeouts.forEach(clearTimeout);
      _timeouts = [];
      // in-flight rings finish their animation and self-remove via animationend
    };
  })();

  // ── Flow engine ───────────────────────────────────────────────────────────
  (() => {
    const track    = document.getElementById('track');
    const MAX_AGE  = 3;
    const MAX_SHOW = 4;

    function ageLines() {
      [...track.children].forEach(el => {
        const cur  = parseInt(el.dataset.age || '0', 10);
        const next = Math.min(cur + 1, MAX_AGE);
        el.dataset.age = String(next);
        el.classList.remove('age-0','age-1','age-2','age-3');
        el.classList.add('age-' + next);
      });
      while (track.children.length > MAX_SHOW) track.removeChild(track.firstElementChild);
    }

    // Streams text in by fading letter batches with a per-character stagger.
    function typeLine(text) {
      ageLines();
      const p = document.createElement('p');
      p.className  = 't-line age-0';
      p.dataset.age = '0';
      track.appendChild(p);

      const CHAR_MS  = 32;  // ms per character
      const FADE_MS  = 350; // fade-in duration — keep in sync with CSS

      return new Promise(resolve => {
        const chars = [...text];
        let i = 0;
        const tick = () => {
          if (_flowPaused) { setTimeout(tick, 80); return; }
          if (i >= chars.length) {
            setTimeout(resolve, FADE_MS);
            return;
          }
          const span = document.createElement('span');
          span.className = 'stream-char';
          span.textContent = chars[i];
          p.appendChild(span);
          i++;
          setTimeout(tick, CHAR_MS);
        };
        setTimeout(tick, 80);
      });
    }

    // TEMP: extra pauses after early nodes for visual review — delete this block when done
    const TEMP_PAUSES = {
      ai_1: 6000,
      ai_2: 6000,
      ai_3: 6000,
      ai_4: 6000,
    };
    // END TEMP

    // Hue offset per AI node — shifts blob palette as conversation progresses
    const BLOB_HUES = {
      ai_1:  0,  ai_2:  8,  ai_3:  18, ai_4:  32,
      ai_5: -14, ai_6: -24, ai_7:  42, ai_8:  -6,
      ai_9: -30, ai_10: 24, ai_11: 12,
    };
    const blobsEl = document.getElementById('blobs');

    async function runNode(nodeId) {
      if (!nodeId) {
        // End of flow — loop back after a pause
        setTimeout(() => { track.innerHTML = ''; runNode(ACTIVE_FLOW.startNode); }, 4000);
        return;
      }
      const node   = ACTIVE_FLOW.nodes[nodeId];
      if (!node) return;
      const isUser = node.type === 'voice_user';
      const vid    = document.getElementById('coachVideo');

      if (!isUser && blobsEl) {
        blobsEl.style.filter = `hue-rotate(${BLOB_HUES[nodeId] ?? 0}deg)`;
      }

      if (isUser) {
        // User turn: keep agent-listening on so the transition to speaking is instant
        // when the next AI turn starts (both class changes batch in MutationObserver).
        document.body.classList.remove('speaking');
        document.body.classList.add('user-speaking');
        if (vid) vid.pause();

        const wordCount = node.text.trim().split(/\s+/).length;
        const estimatedMs = Math.max(1200, wordCount * 430); // ~140 WPM
        const userAudioSrc = !_muted && window.ELEVEN_KEY ? await elevenLabsTTS(node.text, window.ELEVEN_VOICE_ID) : null;
        await Promise.all([
          _muted ? Promise.resolve() : playAudio(userAudioSrc, false),
          new Promise(r => setTimeout(r, estimatedMs)),
        ]);

        document.body.classList.remove('user-speaking');
      } else {
        // AI turn: reset waveform before state changes so it never bleeds into speaking.
        _resetLwBars();
        track.innerHTML = '';
        document.body.classList.remove('agent-listening');
        if (vid) vid.play().catch(() => {});
        document.body.classList.add('speaking');
        startRings();
        const audioSrc = node.audio || (!_muted && window.ELEVEN_KEY ? await elevenLabsTTS(node.text, window.ELEVEN_INTERVIEWER_VOICE_ID || window.ELEVEN_VOICE_ID) : null);
        await Promise.all([
          _muted ? Promise.resolve() : playAudio(audioSrc, true),
          typeLine(node.text),
        ]);
        stopRings();
        if (!_muted) document.body.classList.remove('speaking');
        if (vid) vid.pause();
        requestAnimationFrame(() => {
          document.body.classList.add('agent-listening');
          _resetLwBars();
          const lw = document.querySelector('.listening-wave');
          if (lw) {
            _lwAnimTimeout = setTimeout(() => {
              if (document.body.classList.contains('agent-listening')) {
                lw.classList.add('animating');
              }
              _lwAnimTimeout = null;
            }, 1500);
          }
        });
      }

      const advance = () => {
        if (!node.next?.autoProgress || !node.next.node) {
          setTimeout(() => { track.innerHTML = ''; runNode(ACTIVE_FLOW.startNode); }, 4000);
          return;
        }
        setTimeout(() => runNode(node.next.node), (node.next.delay ?? 0) + (TEMP_PAUSES[nodeId] ?? 0)); // TEMP
      };

      if (_flowPaused) {
        _resumeFlow = advance;
      } else {
        advance();
      }
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      if (_sessionStarted) return;
      _sessionStarted = true;
      const startRing  = document.querySelector('.start-avatar-ring');
      const convBorder = document.querySelector('.avatar-border');
      const convAvatar = document.querySelector('.avatar');

      const src = startRing.getBoundingClientRect();

      // Build fly: gradient ring shell + inner image
      const fly = document.createElement('div');
      fly.className = 'avatar-fly';
      Object.assign(fly.style, {
        position: 'fixed', zIndex: '200',
        left: src.left + 'px', top: src.top + 'px',
        width: src.width + 'px', height: src.height + 'px',
        borderRadius: '50%',
        background: 'conic-gradient(from 290deg, #4751AD 0%, #C262BF 50%, #4751AD 100%)',
        padding: '3px', boxSizing: 'border-box',
      });
      const flyInner = document.createElement('div');
      Object.assign(flyInner.style, {
        width: '100%', height: '100%', borderRadius: '50%',
        overflow: 'hidden',
        background: "url('images/john.png') center top/cover no-repeat",
      });
      fly.appendChild(flyInner);
      document.body.appendChild(fly);

      // Hide real avatars while fly is live
      startRing.style.opacity = '0';
      convBorder.style.opacity = '0';
      convBorder.style.transition = convAvatar.style.transition = 'none';
      convAvatar.style.opacity = '0';

      // Remove not-started (triggers start-screen exit), hold center invisible
      document.body.classList.remove('not-started');
      document.body.classList.add('avatar-transitioning');
      _startSession();

      // Measure final dest now (.center has no transform offset due to avatar-transitioning)
      const dst = convBorder.getBoundingClientRect();
      const vpCx = src.left + src.width / 2;
      const dur  = 480;
      const ease = 'cubic-bezier(.4,0,.2,1)';

      function moveFly(rect, d) {
        fly.style.transition = `left ${d}ms ${ease},top ${d}ms ${ease},width ${d}ms ${ease},height ${d}ms ${ease}`;
        Object.assign(fly.style, {
          left: rect.left + 'px', top: rect.top + 'px',
          width: rect.width + 'px', height: rect.height + 'px',
        });
      }

      requestAnimationFrame(() => requestAnimationFrame(() => {
        // Phase 1 — move to final vertical position and grow simultaneously
        moveFly({ left: vpCx - dst.width/2, top: dst.top,
                  width: dst.width, height: dst.height }, dur);

        setTimeout(() => {
          // Phase 2 — slide left to final conversation position
          moveFly({ left: dst.left, top: dst.top, width: dst.width, height: dst.height }, dur);

          setTimeout(() => {
            // Step 1: reveal real avatar beneath the fly
            document.body.classList.remove('avatar-transitioning');
            document.querySelector('.center').style.opacity  = '';
            document.querySelector('.toolbar').style.opacity = '';
            convBorder.style.transition = 'opacity 200ms ease';
            convAvatar.style.transition = 'opacity 200ms ease';
            convBorder.style.opacity    = '1';
            convAvatar.style.opacity    = '1';
            // Step 2: once real avatar is in, fade out and remove fly
            setTimeout(() => {
              fly.style.transition = 'opacity 200ms ease';
              fly.style.opacity = '0';
              setTimeout(() => {
                fly.remove();
                convBorder.style.transition = convAvatar.style.transition = '';
                // Start conversation after ~1s delay
                const startNode = _startNodeOverride ?? ACTIVE_FLOW.startNode;
                _startNodeOverride = null;
                setTimeout(() => runNode(startNode), 1000);
              }, 220);
            }, 220);
          }, dur + 50);
        }, dur);
      }));
    });
  })();

  // End button — no action (prototype)

  // ── Debug widget ──────────────────────────────────────────────────────────
  setTimeout(() => {
    const widget = document.getElementById('debugWidget');
    const toggle = document.getElementById('debugToggle');
    const body   = document.getElementById('debugBody');

    // Collapse/expand
    toggle.addEventListener('click', () => {
      const collapsed = widget.classList.toggle('debug-collapsed');
      toggle.querySelector('.mdi').className = collapsed ? 'mdi mdi-chevron-up' : 'mdi mdi-chevron-down';
    });

    // Hide until refresh
    document.getElementById('debugHide').addEventListener('click', () => {
      widget.remove();
    });

    // View selection
    document.getElementById('debugViewStart').addEventListener('click', () => {
      document.body.classList.add('not-started');
      setActive('debugViewStart');
    });

    document.getElementById('debugViewConvo').addEventListener('click', () => {
      document.body.classList.remove('not-started');
      // Ensure conversation elements are visible
      document.querySelector('.center').style.opacity  = '';
      document.querySelector('.toolbar').style.opacity = '';
      setActive('debugViewConvo');
    });

    // State selection
    document.getElementById('debugStateSpeaking').addEventListener('click', () => {
      _flowPaused = true;
      document.body.classList.remove('not-started', 'agent-listening', 'user-speaking', 'mic-off');
      document.querySelector('.center').style.opacity  = '';
      document.querySelector('.toolbar').style.opacity = '';
      document.body.classList.add('speaking');
      const cvid = document.getElementById('coachVideo');
      const lvid = document.getElementById('listeningVideo');
      if (cvid) cvid.play().catch(() => {});
      if (lvid) lvid.pause();
      startRings();
      setActive('debugStateSpeaking', 'debugViewConvo');
    });

    document.getElementById('debugStateListening').addEventListener('click', () => {
      _flowPaused = true;
      document.body.classList.remove('not-started', 'speaking', 'user-speaking', 'mic-off');
      document.querySelector('.center').style.opacity  = '';
      document.querySelector('.toolbar').style.opacity = '';
      document.body.classList.add('agent-listening');
      const cvid = document.getElementById('coachVideo');
      const lvid = document.getElementById('listeningVideo');
      if (cvid) cvid.pause();
      if (lvid) {
        if (lvid.readyState >= 2) lvid.play().catch(() => {});
        else lvid.addEventListener('canplay', () => lvid.play().catch(() => {}), { once: true });
      }
      stopRings();
      setActive('debugStateListening', 'debugViewConvo');
    });

    function setActive(...ids) {
      document.querySelectorAll('.debug-btn').forEach(b => b.classList.remove('debug-active'));
      ids.forEach(id => document.getElementById(id)?.classList.add('debug-active'));
    }
  }, 0);

  // ── Flow selector ────────────────────────────────────────────────────────
  setTimeout(() => {
    document.querySelectorAll('.fs-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (_sessionStarted) resetSession();
        document.body.classList.add('not-started');
        document.querySelectorAll('.fs-btn').forEach(b => b.classList.remove('fs-active'));
        document.querySelectorAll('.debug-btn').forEach(b => b.classList.remove('debug-active'));
        btn.classList.add('fs-active');
        const flowId  = btn.dataset.flow;
        const varName = `FLOW_${flowId}`;
        const s = document.createElement('script');
        s.src = `flows/${flowId}.js?_=${Date.now()}`;
        s.onload = () => loadFlow(window[varName]);
        document.head.appendChild(s);
      });
    });
  }, 0);
</script>
